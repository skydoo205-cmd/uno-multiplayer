<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNO Master V5.2 - Tournament Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bgm" src="bgm.mp3" preload="auto" loop></audio>
    <audio id="sfx-play" src="sounds/play.mp3" preload="auto"></audio>
    <audio id="sfx-draw" src="sounds/draw.mp3" preload="auto"></audio>
    <audio id="sfx-uno" src="sounds/uno.mp3" preload="auto"></audio>
    <audio id="sfx-win" src="sounds/win.mp3" preload="auto"></audio>

    <div id="lobby-overlay">
        <div class="menu-box">
            <h1>UNO Multiplayer</h1>
            <p>Start a new tournament or join friends</p>
            
            <div class="input-group">
                <input type="text" id="display-name" placeholder="Enter Name...">
                <select id="player-limit">
                    <option value="2">2 Players</option>
                    <option value="3">3 Players</option>
                    <option value="4" selected>4 Players</option>
                    <option value="5">5 Players</option>
                </select>
            </div>

            <button class="btn-create" onclick="createRoom()">Create New Room</button>
            
            <div class="divider">OR</div>

            <div class="join-group">
                <input type="text" id="room-input" placeholder="4-Digit Code" maxlength="4">
                <button class="btn-join" onclick="joinRoom()">Join Room</button>
            </div>
        </div>
    </div>

    <div id="game-container" style="display: none;">
        <div id="sidebar">
            <div id="room-display">ROOM: ----</div>
            <div id="stats-list"></div>
            
            <div id="deck-info" class="deck-count-text">DECK: --</div>
            <div id="stack-tracker" style="display: none;">🔥 STACK: +0</div>
        </div>

        <div id="main-play-area">
            <div id="status">Connecting...</div>
            <div id="spectator-ui" style="display:none;">👁️ SPECTATING MODE (GOD MODE ON)</div>
            
            <div id="reaper-status" style="display: none;"></div>

            <div id="deck-area">
                <div id="draw-pile" class="card back" onclick="emitDraw()">DECK</div>
                <div id="top-card" class="card">?</div>
            </div>
            
            <div id="controls">
                <button id="uno-btn" onclick="emitUno()" class="ctrl-btn" style="display:none;">SAY UNO!</button>
                <button id="penalty-btn" onclick="emitPenalty()" class="ctrl-btn" style="display:none;">PENALTY!</button>
                <button id="pass-btn" onclick="emitPass()" class="ctrl-btn" style="display:none;">PASS</button>
            </div>

            <div id="my-hand"></div>

            <div id="bottom-scoreboard">
                <div class="scoreboard-title">LIVE TOURNAMENT STANDINGS</div>
                <div id="live-scores-container"></div>
            </div>
        </div> 

        <div id="chat-container">
            <div class="chat-header">ROOM CHAT</div>
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type message..." maxlength="50">
                <button onclick="sendChatMessage()">SEND</button>
            </div>
        </div>
    </div> 

    <div id="scoreboard-overlay" style="display:none;">
        <div class="menu-box">
            <h2>Tournament Results</h2>
            <div id="score-list"></div>
            <div id="restart-status" style="margin: 10px 0; color: #aaa; font-size: 0.8rem;"></div>

            <button class="btn-next" onclick="requestRestart()">Next Round</button>
            <button class="btn-exit" onclick="exitToLobby()">Exit Tournament</button>
        </div>
    </div>

    <div id="color-picker" style="display: none;">
        <p style="font-weight: 900; color: white;">PICK A COLOR:</p>
        <div class="color-btns">
            <button onclick="chooseColor('red')" class="btn-red"></button>
            <button onclick="chooseColor('blue')" class="btn-blue"></button>
            <button onclick="chooseColor('green')" class="btn-green"></button>
            <button onclick="chooseColor('yellow')" class="btn-yellow"></button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>

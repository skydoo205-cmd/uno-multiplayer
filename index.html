<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNO Master V5.2 - Stability Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bgm" src="bgm.mp3" preload="auto" loop></audio>
    <audio id="sfx-play" src="sounds/play.mp3" preload="auto"></audio>
    <audio id="sfx-draw" src="sounds/draw.mp3" preload="auto"></audio>
    <audio id="sfx-uno" src="sounds/uno.mp3" preload="auto"></audio>

    <div id="lobby-overlay">
        <div class="lobby-box">
            <h1>UNO MULTIPLAYER</h1>
            
            <div class="input-group">
                <label>Display Name:</label>
                <input type="text" id="name-input" placeholder="Enter Name..." maxlength="10">
            </div>

            <div class="input-group">
                <label>Room Size:</label>
                <select id="player-limit">
                    <option value="2">2 Players</option>
                    <option value="3">3 Players</option>
                    <option value="4" selected>4 Players</option>
                    <option value="5">5 Players</option>
                    <option value="6">6 Players</option>
                </select>
            </div>
            
            <button onclick="createRoom()" class="lobby-btn">CREATE ROOM</button>
            <div class="separator">OR</div>
            <input type="text" id="room-input" placeholder="4-Digit Code" maxlength="4">
            <button onclick="joinRoom()" class="lobby-btn join">JOIN ROOM</button>
        </div>
    </div>

    <div id="game-container" style="display: none;">
        
        <div id="sidebar">
            <div id="room-display">ROOM: ----</div>
            <div id="stats-list"></div> <div id="deck-info" class="deck-count-text">DECK: --</div>
            <div id="stack-tracker" style="display: none;">🔥 STACK: +0</div>
        </div>

        <div id="main-play-area">
            <div id="status">Connecting...</div>
            <div id="reaper-status" style="color: #ff4d4d; font-weight: bold; display: none;"></div>

            <div id="deck-area">
                <div id="draw-pile" class="card back" onclick="emitDraw()">DECK</div>
                <div id="top-card" class="card">?</div>
            </div>
            
            <div id="controls">
                <button id="uno-btn" onclick="emitUno()" class="ctrl-btn" style="display:none;">SAY UNO!</button>
                <button id="penalty-btn" onclick="emitPenalty()" class="ctrl-btn" style="display:none;">PENALTY!</button>
                <button id="pass-btn" onclick="emitPass()" class="ctrl-btn" style="display:none;">PASS</button>
            </div>

            <div id="my-hand"></div>

            <div id="bottom-scoreboard">
                <div class="scoreboard-title">LIVE TOURNAMENT STANDINGS</div>
                <div id="live-scores-container"></div>
            </div>
        </div> 

        <div id="chat-container">
            <div class="chat-header">ROOM CHAT</div>
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Message..." maxlength="50">
                <button onclick="sendChatMessage()" id="chat-send-btn">SEND</button>
            </div>
        </div>
    </div> 

    <div id="scoreboard-overlay" style="display: none;">
        <div id="scoreboard-content">
            <h2>Tournament Results</h2>
            <div id="score-list"></div>
            <div id="restart-status" style="color: gold; margin: 10px 0;"></div>
            <button id="next-round-btn" onclick="requestRestart()" class="lobby-btn join" style="display:none;">Next Round</button>
            <button onclick="exitToLobby()" class="lobby-btn exit-btn">Exit Tournament</button>
        </div>
    </div>

    <div id="color-picker">
        <p>PICK A COLOR:</p>
        <div class="color-btns">
            <button onclick="chooseColor('red')" class="btn-red"></button>
            <button onclick="chooseColor('blue')" class="btn-blue"></button>
            <button onclick="chooseColor('green')" class="btn-green"></button>
            <button onclick="chooseColor('yellow')" class="btn-yellow"></button>
        </div>
    </div>

    <div id="spectator-ui" style="display:none;">
        👁️ SPECTATING MODE
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>

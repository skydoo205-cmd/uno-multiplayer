<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Tournament Master</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="sidebar">
            <h3>Card Counts</h3>
            <div id="stats-list"></div>
        </div>

        <div id="main-play-area">
            <h1>UNO Multiplayer</h1>
            <div id="status">Waiting for players (0/4)...</div>

            <div id="deck-area">
                <div id="draw-pile" class="card back">Deck</div>
                <div id="top-card-container">
                    <div id="top-card" class="card">?</div>
                </div>
            </div>

            <div id="controls">
                <button id="uno-btn" onclick="sayUno()">SAY UNO!</button>
                <button id="pass-btn" style="display:none;" onclick="passTurn()">PASS TURN</button>
            </div>

            <div id="color-picker">
                <p>Pick a Color:</p>
                <button onclick="chooseColor('red')" class="btn-red"></button>
                <button onclick="chooseColor('blue')" class="btn-blue"></button>
                <button onclick="chooseColor('green')" class="btn-green"></button>
                <button onclick="chooseColor('yellow')" class="btn-yellow"></button>
            </div>

            <hr>
            <h3>Your Hand</h3>
            <div id="my-hand"></div>
        </div>
    </div>

    <div id="scoreboard-overlay" style="display:none;">
        <div id="scoreboard-content">
            <h2>Tournament Results</h2>
            <div id="score-list"></div>
            <div class="score-buttons">
                <button onclick="requestRestart()" class="restart-btn">Restart Game</button>
                <button onclick="exitGame()" class="exit-btn">Exit Tournament</button>
            </div>
            <p id="vote-count">Votes: 0/4</p>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>

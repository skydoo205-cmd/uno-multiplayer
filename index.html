<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Tournament</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="sidebar">
            <h3>Players</h3>
            <div id="stats-list"></div>
        </div>

        <div id="main-play-area">
            <h1 id="game-title">UNO Multiplayer</h1>
            <div id="status">Waiting for players (0/4)...</div>

            <div id="deck-area">
                <div id="draw-pile" class="card back">Deck</div>
                <div id="top-card-container">
                    <div id="top-card" class="card">?</div>
                </div>
            </div>

            <div id="controls">
                <button id="pass-btn" style="display:none;">Pass Turn</button>
            </div>

            <div id="color-picker">
                <p>Pick a Color:</p>
                <div class="color-btns">
                    <button onclick="chooseColor('red')" class="btn-red"></button>
                    <button onclick="chooseColor('blue')" class="btn-blue"></button>
                    <button onclick="chooseColor('green')" class="btn-green"></button>
                    <button onclick="chooseColor('yellow')" class="btn-yellow"></button>
                </div>
            </div>

            <hr>
            <h3>Your Hand</h3>
            <div id="my-hand"></div>
        </div>
    </div>

    <div id="scoreboard-overlay" style="display:none;">
        <div id="scoreboard-content">
            <h2>Tournament Results</h2>
            <div id="score-list"></div>
            <div class="score-buttons">
                <button onclick="requestRestart()" class="restart-btn">Restart</button>
                <button onclick="exitGame()" class="exit-btn">Exit</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>

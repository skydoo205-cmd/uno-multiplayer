<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Master V3 - Tournament Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="lobby-overlay">
        <div class="lobby-box">
            <h1>UNO Multiplayer</h1>
            <div style="margin: 20px 0;">
                <label style="color: gold; font-weight: bold;">Room Size:</label>
                <select id="player-limit">
                    <option value="2">2 Players</option>
                    <option value="3">3 Players</option>
                    <option value="4" selected>4 Players</option>
                    <option value="5">5 Players</option>
                    <option value="6">6 Players</option>
                </select>
            </div>
            <button onclick="createRoom()" class="lobby-btn">Create Room</button>
            <div class="separator">OR</div>
            <input type="text" id="room-input" placeholder="4-Digit Code" maxlength="4">
            <button onclick="joinRoom()" class="lobby-btn join">Join Room</button>
        </div>
    </div>

    <div id="game-container">
        <div id="sidebar">
            <div id="room-display">ROOM: ----</div>
            <div id="stats-list"></div>
            <div id="deck-info" class="deck-count-text">DECK: --</div>
        </div>

        <div id="main-play-area">
            <div id="status">Connecting...</div>
            <div id="reaper-status" style="color: #ff4d4d; font-weight: bold; display: none;"></div>

            <div id="deck-area">
                <div id="draw-pile" class="card back" onclick="emitDraw()">DECK</div>
                <div id="top-card" class="card">?</div>
            </div>
            
            <div id="controls">
                 <button id="uno-btn" onclick="emitUno()" class="ctrl-btn">SAY UNO!</button>
                 <button id="penalty-btn" onclick="emitPenalty()" class="ctrl-btn">PENALTY!</button>
                 <button id="pass-btn" onclick="emitPass()" class="ctrl-btn">PASS</button>
            </div>

            <div id="my-hand"></div>

            <div id="bottom-scoreboard">
                <div class="scoreboard-title">TOURNAMENT STANDINGS</div>
                <div id="live-scores-container"></div>
            </div>
        </div> 

        <div id="chat-container">
            <div class="chat-header">ROOM CHAT</div>
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type message..." maxlength="50">
                <button onclick="sendChatMessage()">SEND</button>
            </div>
        </div>
    </div> 

    <div id="scoreboard-overlay">
        <div id="scoreboard-content">
            <h2>Tournament Results</h2>
            <div id="score-list"></div>
            <div id="restart-status" style="color: gold; margin: 10px 0;"></div>
            <button id="next-round-btn" onclick="requestRestart()" class="lobby-btn join">Next Round</button>
            <button onclick="exitToLobby()" class="lobby-btn" style="background:#c0392b; border: 2px solid #fff;">Exit Tournament</button>
        </div>
    </div>

    <div id="color-picker">
        <p>Pick a Color:</p>
        <div class="color-btns">
            <button onclick="chooseColor('red')" class="btn-red"></button>
            <button onclick="chooseColor('blue')" class="btn-blue"></button>
            <button onclick="chooseColor('green')" class="btn-green"></button>
            <button onclick="chooseColor('yellow')" class="btn-yellow"></button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
